# Banco de dados H2 em memoria - execucao local sem Docker nem PostgreSQL.
# Para usar PostgreSQL, rode com o perfil "postgres":
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=postgres
spring.datasource.url=jdbc:h2:mem:gericare;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console web do H2 disponivel em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
